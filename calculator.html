<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Basic Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    .calculator {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 1.5rem;
      width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .display {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 1rem;
      text-align: right;
      min-height: 70px;
    }

    .display .expr {
      font-size: 13px;
      color: #999;
      min-height: 18px;
      word-break: break-all;
    }

    .display .result {
      font-size: 30px;
      font-weight: 500;
      color: #111;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      background: #fff;
      color: #111;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #f0f0f0; }
    button:active { transform: scale(0.96); }

    .btn-wide { grid-column: span 2; text-align: left; padding-left: 22px; }

    .btn-op {
      background: #eef5ff;
      color: #185fa5;
      border-color: #c5dcf5;
    }

    .btn-op:hover { background: #dceeff; }

    .btn-clear {
      background: #fff0f0;
      color: #a32d2d;
      border-color: #f7c1c1;
    }

    .btn-clear:hover { background: #ffe0e0; }

    .btn-equals {
      background: #378ADD;
      color: #fff;
      border: none;
      font-weight: 500;
    }

    .btn-equals:hover { background: #2a6db5; }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons">
    <button class="btn-clear btn-wide" onclick="press('AC')">AC</button>
    <button class="btn-op" onclick="press('%')">%</button>
    <button class="btn-op" onclick="press('/')">÷</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="btn-op" onclick="press('*')">×</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="btn-op" onclick="press('-')">−</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="btn-op" onclick="press('+')">+</button>

    <button class="btn-wide" onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button class="btn-equals" onclick="press('=')">=</button>
  </div>
</div>

<script>
  let expr = '';
  let justEvaled = false;

  function press(val) {
    const exprEl = document.getElementById('expr');
    const resultEl = document.getElementById('result');

    if (val === 'AC') {
      expr = '';
      exprEl.textContent = '';
      resultEl.textContent = '0';
      justEvaled = false;
      return;
    }

    if (val === '=') {
      if (!expr) return;
      try {
        let res = Function('"use strict"; return (' + expr + ')')();
        if (!isFinite(res)) { resultEl.textContent = 'Error'; return; }
        exprEl.textContent = expr.replace(/\*/g,'×').replace(/\//g,'÷') + ' =';
        let display = parseFloat(res.toFixed(10)).toString();
        resultEl.textContent = display;
        expr = display;
        justEvaled = true;
      } catch(e) {
        resultEl.textContent = 'Error';
      }
      return;
    }

    const ops = ['+', '-', '*', '/'];
    const isOp = ops.includes(val);

    if (justEvaled && !isOp) { expr = ''; exprEl.textContent = ''; justEvaled = false; }
    if (justEvaled && isOp) { justEvaled = false; }

    if (val === '%') {
      try {
        let res = Function('"use strict"; return (' + expr + ')')();
        expr = (res / 100).toString();
        resultEl.textContent = expr;
        exprEl.textContent = '';
      } catch(e) {}
      return;
    }

    if (val === '.' && expr.split(/[\+\-\*\/]/).pop().includes('.')) return;

    expr += val;
    exprEl.textContent = expr.replace(/\*/g, '×').replace(/\//g, '÷');

    try {
      if (!isOp) {
        let res = Function('"use strict"; return (' + expr + ')')();
        if (isFinite(res)) resultEl.textContent = parseFloat(res.toFixed(10)).toString();
      }
    } catch(e) {}
  }

  document.addEventListener('keydown', function(e) {
    const map = { 'Enter': '=', 'Escape': 'AC', 'Backspace': 'AC' };
    const k = map[e.key] || e.key;
    if ('0123456789.+-*/=%'.includes(k)) press(k);
  });
</script>

</body>
</html>
